  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

    }
    .header {
      background: linear-gradient(135deg, #0f0f2a 0%, #1a1a4e 100%);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #64ffda44, transparent);
    }
    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }
    .header h1 span { background: linear-gradient(135deg, #64ffda, #48c6ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: #8892b0; font-size: 0.9rem; margin-bottom: 1rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .btn {
      padding: 0.45rem 1rem;
      border: 1px solid rgba(100,255,218,0.25);
      border-radius: 8px;
      background: rgba(100,255,218,0.08);
      color: #64ffda;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover {
      background: rgba(100,255,218,0.18);
      border-color: rgba(100,255,218,0.5);
    }
    .btn-danger {
      border-color: rgba(255,107,107,0.25);
      color: #ff6b6b;
      background: rgba(255,107,107,0.08);
    }
    .btn-danger:hover {
      background: rgba(255,107,107,0.18);
      border-color: rgba(255,107,107,0.5);
    }
    .btn-primary {
      border-color: rgba(72,198,239,0.3);
      color: #48c6ef;
      background: rgba(72,198,239,0.08);
    }
    .btn-primary:hover {
      background: rgba(72,198,239,0.18);
    }
    #addBtn { display: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem; }
    .category { margin-bottom: 2rem; }
    .category-title {
      font-size: 1.2rem;
      font-weight: 600;
      padding-bottom: 0.5rem;
      margin-bottom: 0.8rem;
      border-bottom: 2px solid rgba(100,255,218,0.12);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #ccd6f6;
    }
    .category-title .count {
      font-size: 0.8rem;
      color: #495670;
      font-weight: 400;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.7rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .card:hover {
      background: rgba(100,255,218,0.05);
      border-color: rgba(100,255,218,0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(100,255,218,0.06);
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 1.8rem;
      text-align: center;
    }
    .card-content { min-width: 0; flex: 1; }
    .card-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #ccd6f6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.77rem;
      color: #6b7394;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .card-url {
      font-size: 0.7rem;
      color: #495670;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .card-edit-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(100,255,218,0.1);
      border-radius: 6px;
      color: #64ffda;
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .card:hover .card-edit-btn { opacity: 1; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #16162a;
      border: 1px solid rgba(100,255,218,0.15);
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #ccd6f6;
    }
    .form-group {
      margin-bottom: 0.8rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #8892b0;
      margin-bottom: 0.3rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: rgba(100,255,218,0.4);
    }
    .form-group select option { background: #16162a; color: #e0e0e0; }
    .form-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .modal .btn { font-size: 0.85rem; padding: 0.5rem 1.2rem; }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a3a;
      border: 1px solid rgba(100,255,218,0.2);
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      color: #ccd6f6;
      font-size: 0.85rem;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .footer {
      text-align: center;
      padding: 2rem;
      color: #495670;
      font-size: 0.8rem;
    }
    .footer a { color: #64ffda; text-decoration: none; }
    #fileInput { display: none; }
    @media (max-width: 640px) {

      .header h1 { font-size: 1.5rem; }
      .toolbar .btn { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
    }
  </style>

  <div class="header">
    <h1>🧭 <span>网站导航</span></h1>
    <p>我的个人网络服务与常用站点</p>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="toggleEditMode()" id="editToggleBtn">✏️ 编辑</button>
      <button class="btn" onclick="exportJSON()">📥 导出 JSON</button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">📤 导入 JSON</button>
      <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
    </div>
  </div>
  <div class="container" id="app"></div>
  <div class="footer">
    <a href="https://github.com/Aprilssky/123">🐟 123</a>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2 id="modalTitle">编辑站点</h2>
      <div class="form-group">
        <label>名称</label>
        <input id="editName" placeholder="站点名称">
      </div>
      <div class="form-group">
        <label>URL</label>
        <input id="editUrl" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>图标（Emoji）</label>
        <input id="editIcon" placeholder="🔗" maxlength="4">
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="editCategory"></select>
      </div>
      <div class="form-group">
        <label>描述</label>
        <input id="editDesc" placeholder="简短描述（可选）">
      </div>
      <div class="form-actions">
        <button class="btn btn-danger" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <h2>管理分类</h2>
      <div id="categoryList" style="margin-bottom:0.8rem;"></div>
      <div class="form-group">
        <label>添加新分类</label>
        <div style="display:flex;gap:0.4rem;">
          <input id="newCategoryName" placeholder="新分类名称" style="flex:1;">
          <button class="btn btn-primary" onclick="addCategory()">添加</button>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeCategoryModal()">完成</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

    const STORAGE_KEY = 'nav123_data';
    const EDIT_MODE_KEY = 'nav123_editMode';
    const catIcons = { '我的服务': '⚡', '云服务': '☁️', '工具': '🔧', '开发': '💻', '未分类': '📦' };

    // ─── Data Loading ───────────────────────────────────────────────
    function getData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { return JSON.parse(raw); } catch(e) {}
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
      return JSON.parse(JSON.stringify(DEFAULT_DATA));
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let editMode = localStorage.getItem(EDIT_MODE_KEY) === 'true';

    // ─── Render ─────────────────────────────────────────────────────
    function render() {
      const data = getData();
      const app = document.getElementById('app');
      app.innerHTML = '';

      const grouped = {};
      data.categoriesOrder.forEach(cat => { grouped[cat] = []; });
      data.websites.forEach(site => {
        const cat = site.category || '未分类';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(site);
      });

      data.categoriesOrder.forEach(cat => {
        const items = grouped[cat];
        if (!items || items.length === 0) return;
        const sec = document.createElement('div');
        sec.className = 'category';
        const icon = catIcons[cat] || '📌';
        sec.innerHTML = `
          <div class="category-title">
            ${icon} ${cat}
            <span class="count">(${items.length})</span>
          </div>
          <div class="grid">
            ${items.map(s => {
              const urlDisplay = s.url ? s.url.replace(/^https?:\/\//, '') : '';
              const editBtn = editMode ? `<button class="card-edit-btn" onclick="event.preventDefault();event.stopPropagation();openEdit('${s.id}')">✏️</button>` : '';
              return `
                <a href="${s.url}" class="card" target="_blank" rel="noopener">
                  ${editBtn}
                  <div class="card-icon">${s.icon || '🔗'}</div>
                  <div class="card-content">
                    <div class="card-name">${s.name}</div>
                    ${s.description ? `<div class="card-desc">${s.description}</div>` : ''}
                    <div class="card-url">${urlDisplay}</div>
                  </div>
                </a>
              `;
            }).join('')}
            ${editMode ? `
              <div class="card" style="border:1px dashed rgba(100,255,218,0.2);cursor:pointer;justify-content:center;background:rgba(100,255,218,0.02);"
                   onclick="openAdd()">
                <span style="color:#64ffda;font-size:1.2rem;">＋ 添加新站点</span>
              </div>
            ` : ''}
          </div>
        `;
        if (editMode) {
          // Add a small "管理分类" button after the grid
          const catMgr = document.createElement('div');
          catMgr.style.cssText = 'margin-top:0.5rem;text-align:right;';
          catMgr.innerHTML = `<button class="btn btn-primary" onclick="openCategoryManager()">📋 管理分类</button>`;
          sec.appendChild(catMgr);
        }
        app.appendChild(sec);
      });

      updateEditToggle();
    }

    // ─── Edit Mode Toggle ───────────────────────────────────────────
    function toggleEditMode() {
      editMode = !editMode;
      localStorage.setItem(EDIT_MODE_KEY, editMode ? 'true' : 'false');
      render();
    }

    function updateEditToggle() {
      const btn = document.getElementById('editToggleBtn');
      if (editMode) {
        btn.innerHTML = '✅ 完成编辑';
        btn.className = 'btn btn-primary';
      } else {
        btn.innerHTML = '✏️ 编辑';
        btn.className = 'btn btn-primary';
      }
    }

    // ─── Modal (Edit / Add) ─────────────────────────────────────────
    let editingId = null;

    function populateCategorySelect() {
      const data = getData();
      const sel = document.getElementById('editCategory');
      sel.innerHTML = data.categoriesOrder.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function openEdit(id) {
      const data = getData();
      const site = data.websites.find(w => w.id === id);
      if (!site) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = '编辑站点';
      document.getElementById('editName').value = site.name || '';
      document.getElementById('editUrl').value = site.url || '';
      document.getElementById('editIcon').value = site.icon || '';
      document.getElementById('editDesc').value = site.description || '';
      populateCategorySelect();
      document.getElementById('editCategory').value = site.category || '未分类';
      document.getElementById('editModal').classList.add('active');
    }

    function openAdd() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '添加新站点';
      document.getElementById('editName').value = '';
      document.getElementById('editUrl').value = '';
      document.getElementById('editIcon').value = '';
      document.getElementById('editDesc').value = '';
      populateCategorySelect();
      document.getElementById('editCategory').value = '未分类';
      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingId = null;
    }

    function saveEdit() {
      const name = document.getElementById('editName').value.trim();
      const url = document.getElementById('editUrl').value.trim();
      const icon = document.getElementById('editIcon').value.trim() || '🔗';
      const category = document.getElementById('editCategory').value;
      const description = document.getElementById('editDesc').value.trim();

      if (!name) { showToast('请输入站点名称'); return; }
      if (!url) { showToast('请输入 URL'); return; }

      const data = getData();

      if (editingId) {
        const site = data.websites.find(w => w.id === editingId);
        if (site) {
          site.name = name;
          site.url = url;
          site.icon = icon;
          site.category = category;
          site.description = description;
          site.updatedAt = new Date().toISOString();
        }
      } else {
        data.websites.push({
          id: String(Date.now()) + String(Math.random()).slice(2,6),
          name,
          url,
          icon,
          category,
          description,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }

      saveData(data);
      closeModal();
      render();
      showToast(editingId ? '✅ 已更新' : '✅ 已添加');
    }

    // ─── Category Manager ───────────────────────────────────────────
    function openCategoryManager() {
      const data = getData();
      const container = document.getElementById('categoryList');
      container.innerHTML = data.categoriesOrder.map((cat, i) => `
        <div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <span style="flex:1;color:#ccd6f6;font-size:0.85rem;">${catIcons[cat] || '📌'} ${cat}</span>
          <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="renameCategory(${i})">✏️</button>
          <button class="btn btn-danger" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="deleteCategory(${i})">🗑️</button>
        </div>
      `).join('');
      document.getElementById('categoryModal').classList.add('active');
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('active');
      render();
    }

    function addCategory() {
      const name = document.getElementById('newCategoryName').value.trim();
      if (!name) { showToast('请输入分类名称'); return; }
      const data = getData();
      if (data.categoriesOrder.includes(name)) { showToast('分类已存在'); return; }
      data.categoriesOrder.push(name);
      saveData(data);
      document.getElementById('newCategoryName').value = '';
      openCategoryManager(); // refresh list
      showToast('✅ 已添加分类');
    }

    function renameCategory(index) {
      const data = getData();
      const oldName = data.categoriesOrder[index];
      const newName = prompt('重命名分类：', oldName);
      if (!newName || newName === oldName) return;
      if (data.categoriesOrder.includes(newName)) { showToast('分类名已存在'); return; }
      data.categoriesOrder[index] = newName;
      data.websites.forEach(w => {
        if (w.category === oldName) w.category = newName;
      });
      saveData(data);
      openCategoryManager();
    }

    function deleteCategory(index) {
      const data = getData();
      const cat = data.categoriesOrder[index];
      if (!confirm(`确定删除分类「${cat}」？\n该分类下的站点将移至「未分类」。`)) return;
      data.categoriesOrder.splice(index, 1);
      data.websites.forEach(w => {
        if (w.category === cat) w.category = '未分类';
      });
      if (!data.categoriesOrder.includes('未分类')) data.categoriesOrder.push('未分类');
      saveData(data);
      openCategoryManager();
      showToast('🗑️ 已删除分类');
    }

    // ─── Export JSON ────────────────────────────────────────────────
    function exportJSON() {
      const data = getData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nav123-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('📥 已导出 JSON');
    }

    // ─── Import JSON ────────────────────────────────────────────────
    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.websites || !imported.categoriesOrder) {
            showToast('❌ JSON 格式无效（缺少 websites 或 categoriesOrder）');
            return;
          }
          if (!confirm(`将导入 ${imported.websites.length} 个站点，${imported.categoriesOrder.length} 个分类。\n当前数据将被覆盖。确定吗？`)) return;
          saveData(imported);
          render();
          showToast(`📤 已导入 ${imported.websites.length} 个站点`);
        } catch(err) {
          showToast('❌ JSON 解析失败：' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ─── Toast ──────────────────────────────────────────────────────
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ─── Init ───────────────────────────────────────────────────────
    render();
  </script>
